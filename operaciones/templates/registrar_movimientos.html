{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Registrar Movimiento - Lógico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-brand"><i class="bi bi-box-seam text-primary"></i> LÓGICO</div>
        
        <div class="sidebar-heading">Mantenedores</div>
        <a href="{% url 'farmacias' %}" class="nav-item-custom"><i class="bi bi-building"></i> Gestor Farmacias</a>
        <a href="{% url 'motoristas' %}" class="nav-item-custom"><i class="bi bi-person-badge"></i> Gestor Motoristas</a>
        <a href="{% url 'registro_motos' %}" class="nav-item-custom"><i class="bi bi-bicycle"></i> Gestor Motos</a>
        
        <div class="sidebar-heading">Operaciones</div>
        <a href="{% url 'asignar_motos' %}" class="nav-item-custom"><i class="bi bi-key"></i> Asignar Motos</a>
        <a href="{% url 'crear_movimiento' %}" class="nav-item-custom"><i class="bi bi-truck"></i> Crear Movimiento</a>
        <a href="{% url 'listado_general' %}" class="nav-item-custom"><i class="bi bi-list-columns-reverse"></i> Listado General</a>
        <div class="sidebar-heading">Navegación</div>
        <a href="{% url 'dashboard' %}" class="nav-item-custom"><i class="bi bi-speedometer2"></i> Dashboard</a>
        
        <div style="margin-top: auto; margin-bottom: 20px;">
            <a href="{% url 'logout' %}" class="nav-item-custom text-danger"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
        </div>
    </div>

    <div id="main-content">
        <div class="topbar">
            <h4 class="text-white mb-0">Registrar Nuevo Movimiento</h4>
        </div>
        <div class="card card-custom p-4 col-md-8 mx-auto">
            <form method="POST" action="{% url 'crear_movimiento' %}">
                {% csrf_token %} <label class="mb-2 text-secondary">Tipo de Movimiento</label>
                <div class="btn-group w-100 mb-4" role="group">
                    <input type="radio" class="btn-check" name="tipoMov" id="btn1" value="Directo" checked>
                    <label class="btn btn-outline-primary" for="btn1">Directo</label>
                    <input type="radio" class="btn-check" name="tipoMov" id="btn2" value="Con Receta">
                    <label class="btn btn-outline-primary" for="btn2">Con Receta</label>
                    <input type="radio" class="btn-check" name="tipoMov" id="btn3" value="Traslado">
                    <label class="btn btn-outline-primary" for="btn3">Traslado</label>
                    <input type="radio" class="btn-check" name="tipoMov" id="btn4" value="Reenvío">
                    <label class="btn btn-outline-primary" for="btn4">Reenvío</label>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label>Farmacia Origen</label>
                        <select class="form-select form-select-custom" name="origen" required>
                            <option value="">Seleccione origen...</option>
                            {% for f in farmacias %}
                                <option value="{{ f.id }}">{{ f.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label>Motorista Asignado</label>
                        <select class="form-select form-select-custom" name="motorista" required>
                            <option value="">Seleccione motorista...</option>
                            {% for m in motoristas %}
                                <option value="{{ m.id }}">{{ m.nombre_completo }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-8">
                        <label>Dirección de Destino</label>
                        <input type="text" class="form-control form-control-custom" name="mov_direccion" placeholder="Ej: Av. Providencia 1234" required>
                    </div>
                    <div class="col-md-4">
                        <label>Comuna de Destino</label>
                        <input type="text" class="form-control form-control-custom" name="mov_comuna" placeholder="Ej: Providencia">
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100 py-2 mt-3">Registrar y Enviar a Listado</button>
            </form>
        </div>
    </div>

    <script src="{% static 'app.js' %}"></script>
</body>
</html>
