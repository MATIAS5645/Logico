<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Movimientos - Lógico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>

   <div id="sidebar">
        <div class="sidebar-brand"><i class="bi bi-box-seam text-primary"></i> LÓGICO</div>
        
        <div class="sidebar-heading">Mantenedores</div>
        <a href="{% url 'farmacias' %}" class="nav-item-custom"><i class="bi bi-building"></i> Gestor Farmacias</a>
        <a href="{% url 'motoristas' %}" class="nav-item-custom"><i class="bi bi-person-badge"></i> Gestor Motoristas</a>
        <a href="{% url 'registro_motos' %}" class="nav-item-custom"><i class="bi bi-bicycle"></i> Gestor Motos</a>
        
        <div class="sidebar-heading">Operaciones</div>
        <a href="{% url 'asignar_motos' %}" class="nav-item-custom"><i class="bi bi-key"></i> Asignar Motos</a>
        <a href="{% url 'crear_movimiento' %}" class="nav-item-custom"><i class="bi bi-truck"></i> Crear Movimiento</a>
        <a href="{% url 'listado_general' %}" class="nav-item-custom"><i class="bi bi-list-columns-reverse"></i> Listado General</a>
        <div class="sidebar-heading">Navegación</div>
        <a href="{% url 'dashboard' %}" class="nav-item-custom"><i class="bi bi-speedometer2"></i> Dashboard</a>
        
        <div style="margin-top: auto; margin-bottom: 20px;">
            <a href="{% url 'logout' %}" class="nav-item-custom text-danger"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
        </div>
    </div>

    <div id="main-content">
        <div class="topbar">
            <h4 class="text-white mb-0">Listado General de Movimientos</h4>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" onclick="window.location.href='registrar_movimiento.html'">
                    <i class="bi bi-plus-circle"></i> Nuevo Movimiento
                </button>
            </div>
        </div>

        <div class="card card-custom p-3 mb-4">
            <div class="row">
                <div class="col-md-4">
                    <input type="text" class="form-control form-control-custom" id="buscMov" placeholder="Buscar por ID o Motorista..." onkeyup="renderMovimientos()">
                </div>
            </div>
        </div>

        <div class="card card-custom p-3">
            <table class="table table-dark table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID Pedido</th>
                        <th>Tipo</th>
                        <th>Origen (Farmacia)</th>
                        <th>Motorista</th>
                        <th>Fecha Realizada</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tablaMovimientos">
                    </tbody>
            </table>
        </div>
    </div>

    <script src="app.js"></script>
    <script>

        const dbMovimientos = [
            { id: "#1001", tipo: "Directo", origen: "Cruz Verde Arica", motorista: "Carlos Méndez", fecha: "08/06/2026", estado: "En ruta" },
            { id: "#1002", tipo: "Con receta", origen: "Cruz verde Santiago", motorista: "Ana Torres", fecha: "08/06/2026", estado: "Entregado" },
            { id: "#1003", tipo: "Traslado", origen: "Cruz verde Concepción", motorista: "Rodrigo Vera", fecha: "07/06/2026", estado: "Entregado" },
            { id: "#1004", tipo: "Reenvío", origen: "Cruz Verde Punta Arenas", motorista: "Carlos Méndez", fecha: "08/06/2026", estado: "Pendiente" }
        ];

        function renderMovimientos() {
            const tbody = document.getElementById('tablaMovimientos');
            const txt = document.getElementById('buscMov').value.toLowerCase();
            tbody.innerHTML = '';
            
            dbMovimientos.filter(m => m.id.toLowerCase().includes(txt) || m.motorista.toLowerCase().includes(txt)).forEach(m => {
                let badge = m.estado === 'Entregado' ? 'bg-success' : (m.estado === 'En ruta' ? 'bg-warning text-dark' : 'bg-secondary');
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${m.id}</strong></td>
                        <td><span class="badge bg-primary">${m.tipo}</span></td>
                        <td>${m.origen}</td>
                        <td>${m.motorista}</td>
                        <td class="text-secondary">${m.fecha}</td>
                        <td><span class="badge ${badge}">${m.estado}</span></td>
                    </tr>
                `;
            });
        }
        document.addEventListener('DOMContentLoaded', renderMovimientos);
    </script>
</body>
</html>
