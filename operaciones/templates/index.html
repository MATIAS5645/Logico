{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Login - Lógico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <style>
        /* Centramos la tarjeta en medio de la pantalla */
        body { background-color: #1e1e1e; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    </style>
</head>
<body>
    <div class="card card-custom p-4" style="width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <div class="text-center mb-4">
            <i class="bi bi-box-seam text-primary" style="font-size: 3rem;"></i>
            <h4 class="text-white mt-2">Sistema Lógico</h4>
        </div>

        <!-- Alertas si se equivoca de clave -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2 text-center" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="text-secondary mb-1">Usuario de Django</label>
                <input type="text" class="form-control form-control-custom" name="username" required>
            </div>
            <div class="mb-4">
                <label class="text-secondary mb-1">Contraseña</label>
                <input type="password" class="form-control form-control-custom" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Ingresar de forma segura</button>
        </form>
    </div>
</body>
</html>
