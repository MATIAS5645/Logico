<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Motorista - Lógico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-brand"><i class="bi bi-box-seam text-primary"></i> LÓGICO</div>
        
        <div class="sidebar-heading">Mantenedores</div>
        <a href="{% url 'farmacias' %}" class="nav-item-custom"><i class="bi bi-building"></i> Gestor Farmacias</a>
        <a href="{% url 'motoristas' %}" class="nav-item-custom"><i class="bi bi-person-badge"></i> Gestor Motoristas</a>
        <a href="{% url 'registro_motos' %}" class="nav-item-custom"><i class="bi bi-bicycle"></i> Gestor Motos</a>
        
        <div class="sidebar-heading">Operaciones</div>
        <a href="{% url 'asignar_motos' %}" class="nav-item-custom"><i class="bi bi-key"></i> Asignar Motos</a>
        <a href="{% url 'crear_movimiento' %}" class="nav-item-custom"><i class="bi bi-truck"></i> Crear Movimiento</a>
        <a href="{% url 'listado_general' %}" class="nav-item-custom"><i class="bi bi-list-columns-reverse"></i> Listado General</a>
        <div class="sidebar-heading">Navegación</div>
        <a href="{% url 'dashboard' %}" class="nav-item-custom"><i class="bi bi-speedometer2"></i> Dashboard</a>
        
        <div style="margin-top: auto; margin-bottom: 20px;">
            <a href="{% url 'logout' %}" class="nav-item-custom text-danger"><i class="bi bi-box-arrow-left"></i> Cerrar Sesión</a>
        </div>
    </div>
    <div id="main-content" style="margin-left: 0; padding: 40px;">
        <div class="card card-custom p-4 col-md-6 mx-auto">
            <h5 class="mb-4 text-white">Registrar Nuevo Motorista</h5>
            <form id="formNewMotorista">
                <div class="mb-3">
                    <label>Nombre Completo</label>
                    <input type="text" class="form-control" id="m_nombre" required>
                </div>
                <div class="mb-3">
                    <label>RUT</label>
                    <input type="text" class="form-control" id="m_rut" placeholder="12.345.678-K" required>
                </div>
                <button type="button" class="btn btn-success w-100" onclick="guardarMotorista()">Guardar Registro</button>
                <a href="motoristas.html" class="btn btn-outline-secondary w-100 mt-2">Volver</a>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function guardarMotorista() {
            const nombre = document.getElementById('m_nombre').value;
            const rut = document.getElementById('m_rut').value;
            
            if(!nombre || !rut) { alert("Complete los campos"); return; }
            
            let db = JSON.parse(localStorage.getItem('dbMotoristas')) || [];
            db.push({ id: Date.now(), nombre: nombre, rut: rut, estado: "Activo" });
            localStorage.setItem('dbMotoristas', JSON.stringify(db));
            
            alert("Motorista agregado correctamente");
            window.location.href = "motoristas.html";
        }
    </script>
</body>
</html>
